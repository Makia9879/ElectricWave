# ElectricWave — 通知服务容器编排
#
# 安全约束（务必遵守）：
# - 仅发布宿主机回环端口 127.0.0.1:8788:8788，绝对不要去掉 "127.0.0.1:" 前缀，
#   否则 8788 会暴露到公网。公网只应由 VPS 的 host-network Nginx 经 443 反代访问。
# - 真实凭据只放在同目录、被根 .gitignore 忽略的 .env 文件中，不得提交。
# - 用 named volume 而非 bind mount：容器以非 root 的 app 用户运行，named volume
#   首次挂载会继承镜像内 /data 的 app 属主，避免 SQLite 写入权限问题。

services:
  electricwave:
    image: electricwave-server:latest
    container_name: electricwave
    restart: unless-stopped
    # 仅回环发布：host-network 的 Nginx 通过 127.0.0.1:8788 访问本服务。
    ports:
      - "127.0.0.1:8788:8788"
    env_file:
      - .env
    environment:
      # 数据落盘到 named volume，容器重建不丢失 receiver/幂等/审计。
      STORAGE_PATH: /data/electricwave.db
      HTTP_ADDR: ":8788"
    volumes:
      - electricwave-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8788/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  electricwave-data:
