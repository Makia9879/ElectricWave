server {
    listen 80;
    listen [::]:80;
    server_name notice.makia98.com;

    access_log /var/log/nginx/notice.access.log notice;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name notice.makia98.com;

    access_log /var/log/nginx/notice.access.log notice;
    ssl_certificate /etc/letsencrypt/live/notice.makia98.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notice.makia98.com/privkey.pem;

    client_max_body_size 64k;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    location / {
        return 404;
    }
}
