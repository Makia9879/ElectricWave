server {
    listen 80;
    listen [::]:80;
    server_name notice.makia98.com;

    access_log /var/log/nginx/notice.access.log notice;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name notice.makia98.com;

    access_log /var/log/nginx/notice.access.log notice;
    ssl_certificate /etc/letsencrypt/live/notice.makia98.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notice.makia98.com/privkey.pem;

    client_max_body_size 64k;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Health check — used for deploy/uptime verification, not a public API contract.
    location = /healthz {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
    }

    # Webhook ingress (notifications API).
    location = /api/v1/notifications {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_request_buffering on;
    }

    # Receiver SSE stream — disable buffering and raise read/send timeouts so the
    # 30s comment heartbeat keeps the connection alive through Nginx.
    location ~ ^/api/v1/receivers/[^/]+/stream$ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;

        # proxy_set_header is not inherited once redefined at this level, so repeat them.
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        add_header X-Accel-Buffering no always;
    }

    # Receiver self-test endpoint.
    location ~ ^/api/v1/receivers/[^/]+/test$ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
    }

    location / {
        return 404;
    }
}
