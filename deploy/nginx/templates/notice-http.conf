server {
    listen 80;
    listen [::]:80;
    server_name notice.makia98.com;

    access_log /var/log/nginx/notice.access.log notice;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
